name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Validate Claude auth token
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "Error: CLAUDE_CODE_OAUTH_TOKEN secret is not set."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        with:
          show_full_output: true
          track_progress: true

          claude_args: |
            --max-turns 30
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(npm install),Bash(npm ci),Bash(npm run build),Bash(npm run build:*),Bash(npm run test:*),Bash(npm run lint:*),Bash(npx ng:*),Bash(git add:*),Bash(git commit:*),Bash(git status),Bash(git diff:*)"
            --system-prompt "You are working in an Angular frontend project. Do not read or search inside node_modules - treat third-party library internals as out of scope; only inspect the project's own src/ directory. Follow Angular style guide conventions: use standalone components where the codebase already does, keep components/services/modules organized per existing folder structure, use TypeScript strictly (no implicit any), match existing naming conventions (kebab-case files, PascalCase classes), and write or update unit tests (.spec.ts) for any new or modified logic. Run npm run lint and npm run test before considering a change complete, and fix any failures those surface. Do not introduce new dependencies unless necessary, and explain in the PR description why any new dependency was added."