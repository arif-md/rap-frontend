name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Validate Claude auth token
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "Error: CLAUDE_CODE_OAUTH_TOKEN secret is not set."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        with:
          show_full_output: true
          track_progress: true

          claude_args: |
            --max-turns 30
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(cat package.json),Bash(npm run lint),Bash(npm run test:*),Bash(git add:*),Bash(git commit:*),Bash(git status),Bash(git diff:*)"
            --system-prompt "You are working in an Angular frontend project. Do not read or search inside node_modules. Before running any npm scripts, check package.json's scripts block first — only run npm run lint or npm run test if those scripts actually exist; if they don't exist, skip that verification step entirely rather than retrying variations of the command, and note in your summary that the step was skipped. Do not create new .spec.ts test files unless a testing convention for this component type already exists elsewhere in the repo to model it on. Prioritize making the requested change correctly over exhaustive verification. Match existing code style and naming conventions. Do not introduce new dependencies unless necessary."